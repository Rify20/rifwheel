<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel — Signature Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f8fafc; 
            color: #0f172a;
            -webkit-font-smoothing: antialiased;
        }

        /* Soft Neumorphism & Glass */
        .panel-elegant {
            background: #ffffff;
            border: 1px solid #f1f5f9;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.04);
        }

        /* Pointer Elegance */
        #pointer-svg {
            filter: drop-shadow(0 4px 12px rgba(37, 99, 235, 0.3));
            transition: all 0.2s ease;
        }

        /* Background Animated Gradient */
        .bg-gradient-soft {
            background: radial-gradient(circle at 0% 0%, #f1f5f9 0%, #ffffff 100%);
        }

        /* Custom Input */
        textarea {
            background: transparent;
            line-height: 1.8;
            letter-spacing: 0.02em;
        }

        /* Modal Overlay */
        .modal-blur {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px) saturate(180%);
        }

        .btn-primary {
            background: #2563eb;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-primary:hover {
            background: #1d4ed8;
            box-shadow: 0 12px 24px -8px rgba(37, 99, 235, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen bg-gradient-soft overflow-hidden">

    <nav class="h-24 px-12 flex items-center justify-between z-50 relative">
        <div class="flex items-center gap-4">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-xl shadow-blue-100">
                <span class="text-white font-black text-lg">R</span>
            </div>
            <div>
                <h1 class="text-sm font-extrabold tracking-[0.2em] uppercase text-slate-900">RifWheel</h1>
                <p class="text-[9px] font-bold text-blue-500 uppercase tracking-widest">Premium Picker</p>
            </div>
        </div>
        <div class="flex items-center gap-8">
            <a href="https://www.instagram.com/rifdev_/" target="_blank" class="text-[10px] font-bold tracking-widest uppercase text-slate-400 hover:text-blue-600 transition-colors">Instagram</a>
            <div class="h-4 w-[1px] bg-slate-200"></div>
            <button onclick="clearAll()" class="text-[10px] font-bold tracking-widest uppercase text-red-400">Reset</button>
        </div>
    </nav>

    <main class="max-w-[1400px] mx-auto flex flex-col lg:flex-row h-[calc(100vh-96px)] items-center px-12 gap-16">
        
        <div class="flex-1 relative flex flex-col items-center">
            <div class="relative w-full max-w-[600px]" id="wheel-frame">
                <div class="absolute -right-4 top-1/2 -translate-y-1/2 z-40" id="pointer-svg">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M5 12L11 18M5 12L11 6" stroke="#2563eb" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>

                <canvas id="wheelCanvas" width="1000" height="1000" class="w-full h-auto"></canvas>
                
                <button onclick="spin()" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-24 h-24 bg-white rounded-full shadow-[0_20px_40px_rgba(0,0,0,0.08)] flex items-center justify-center z-50 group transition-transform hover:scale-110 active:scale-95">
                    <div class="w-20 h-20 rounded-full border border-slate-100 flex items-center justify-center">
                        <span class="text-[10px] font-black text-blue-600 tracking-tighter italic">SPIN</span>
                    </div>
                </button>
            </div>
        </div>

        <div class="w-full lg:w-[450px] h-full py-12">
            <div class="panel-elegant h-full rounded-[40px] p-10 flex flex-col relative overflow-hidden">
                <div class="mb-8">
                    <h3 class="text-xl font-bold tracking-tight text-slate-800">Daftar Nama</h3>
                    <p class="text-xs font-medium text-slate-400 mt-1">Satu nama untuk setiap baris.</p>
                </div>
                
                <textarea id="namesInput" spellcheck="false" 
                    class="flex-1 w-full border-none outline-none text-lg font-medium text-slate-600 placeholder:text-slate-200 resize-none" 
                    placeholder="Masukkan nama..."></textarea>
                
                <div class="mt-6 flex justify-between items-center">
                    <div id="count" class="text-[10px] font-bold text-slate-400 tracking-widest uppercase bg-slate-50 px-3 py-1.5 rounded-lg">0 Entri</div>
                    <button onclick="shuffleNames()" class="text-[10px] font-bold text-blue-600 tracking-widest uppercase hover:opacity-70">Acak Daftar</button>
                </div>
            </div>
        </div>
    </main>

    <div id="winnerModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 modal-blur"></div>
        <div class="bg-white relative p-12 rounded-[50px] shadow-[0_50px_100px_rgba(0,0,0,0.1)] max-w-sm w-full text-center border border-white">
            <div class="text-[10px] font-black tracking-[0.4em] text-blue-600 uppercase mb-6 opacity-40 italic">Result</div>
            <h2 id="winnerName" class="text-4xl font-extrabold text-slate-900 mb-12 tracking-tight"></h2>
            
            <div class="flex flex-col gap-3">
                <button onclick="removeWinner()" class="w-full py-5 btn-primary text-white rounded-[24px] font-bold text-xs tracking-widest">HAPUS NAMA</button>
                <button onclick="closeModal()" class="w-full py-5 text-slate-400 font-bold text-xs tracking-widest hover:text-slate-600">LANJUTKAN</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        
        let names = [];
        let currentRotation = 0;
        let isSpinning = false;
        let winnerIdx = -1;

        // Sound System
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(1000, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }

        // Palette: Gradient Blues (Analogous)
        const palette = ['#1e40af', '#2563eb', '#3b82f6', '#60a5fa', '#93c5fd', '#dbeafe'];

        function draw() {
            names = namesInput.value.split('\n').filter(n => n.trim() !== "");
            document.getElementById('count').innerText = `${names.length} ENTRI`;
            localStorage.setItem('rifwheel_signature', namesInput.value);

            const arcSize = (2 * Math.PI) / (names.length || 1);
            ctx.clearRect(0, 0, 1000, 1000);

            if (names.length === 0) {
                ctx.fillStyle = "#f8fafc";
                ctx.beginPath(); ctx.arc(500, 500, 480, 0, 2 * Math.PI); ctx.fill();
                return;
            }

            names.forEach((name, i) => {
                const angle = currentRotation + i * arcSize;
                
                // Segment Color
                ctx.fillStyle = palette[i % palette.length];
                ctx.beginPath();
                ctx.moveTo(500, 500);
                ctx.arc(500, 500, 480, angle, angle + arcSize);
                ctx.fill();

                // Text
                ctx.save();
                ctx.translate(500, 500);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (i % palette.length) > 3 ? "#1e40af" : "#ffffff";
                ctx.font = "600 22px 'Inter'";
                ctx.fillText(name.substring(0, 18), 440, 8);
                ctx.restore();
            });

            // Outer ring elegant
            ctx.beginPath();
            ctx.arc(500, 500, 480, 0, 2 * Math.PI);
            ctx.strokeStyle = '#ffffff';
            ctx.lineWidth = 12;
            ctx.stroke();
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            
            const duration = 7000;
            const extraRotation = (Math.random() * 6 + 12) * Math.PI * 2;
            const startRotation = currentRotation;
            const startTime = performance.now();
            let lastTick = 0;

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 5); // Smooth decelerating
                
                currentRotation = startRotation + (extraRotation * ease);
                
                const arcSize = (2 * Math.PI) / names.length;
                if (Math.floor(currentRotation / (arcSize/2)) !== lastTick) {
                    playTick();
                    lastTick = Math.floor(currentRotation / (arcSize/2));
                }

                draw();

                if (progress < 1) requestAnimationFrame(animate);
                else {
                    isSpinning = false;
                    const normalized = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
                    winnerIdx = Math.floor(normalized / arcSize);
                    showWinner(names[winnerIdx]);
                }
            }
            requestAnimationFrame(animate);
        }

        function showWinner(name) {
            document.getElementById('winnerName').innerText = name;
            document.getElementById('winnerModal').classList.remove('hidden');
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#2563eb', '#ffffff', '#60a5fa']
            });
        }

        function removeWinner() {
            if (winnerIdx > -1) {
                names.splice(winnerIdx, 1);
                namesInput.value = names.join('\n');
                closeModal();
                draw();
            }
        }

        function closeModal() { document.getElementById('winnerModal').classList.add('hidden'); }
        function shuffleNames() {
            let arr = namesInput.value.split('\n').filter(n => n.trim() !== "");
            arr.sort(() => Math.random() - 0.5);
            namesInput.value = arr.join('\n');
            draw();
        }
        function clearAll() { if(confirm('Reset semua?')) { namesInput.value = ""; draw(); } }

        namesInput.value = localStorage.getItem('rifwheel_signature') || "Muhammad Rifqi\nStrategy Design\nBrand Identity\nDevelopment\nInterface Design";
        namesInput.addEventListener('input', draw);
        draw();
    </script>
</body>
</html>
