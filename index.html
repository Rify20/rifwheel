<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel Ultra | Blue & White Elite</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: linear-gradient(135deg, #f0f7ff 0%, #ffffff 100%);
            min-height: 100vh;
            color: #1e3a8a;
        }
        
        .soft-card {
            background: #ffffff;
            border-radius: 50px;
            box-shadow: 0 30px 60px -15px rgba(37, 99, 235, 0.08);
        }

        .dev-profile {
            background: linear-gradient(135deg, #3b82f6, #60a5fa);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
            transition: all 0.3s ease;
        }

        #wheel { 
            filter: drop-shadow(0 40px 80px rgba(37, 99, 235, 0.15));
        }

        .btn-play {
            background: #ffffff;
            box-shadow: 0 15px 35px rgba(0,0,0,0.05);
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play:active { transform: translate(-50%, -50%) scale(0.9); }

        .tab-btn { transition: all 0.3s ease; position: relative; opacity: 0.4; }
        .tab-active { opacity: 1; color: #2563eb; }
        .tab-active::after {
            content: ""; position: absolute; bottom: -10px; left: 50%; transform: translateX(-50%);
            width: 20px; height: 4px; background: #3b82f6; border-radius: 10px;
        }

        textarea {
            background: #f8fbff !important;
            border: none !important;
            color: #1e40af !important;
        }
        
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

<body class="overflow-x-hidden">

<header class="flex justify-between items-center px-12 py-12 max-w-7xl mx-auto">
    <h1 class="text-3xl font-[800] tracking-tighter text-blue-900">RifWheel<span class="text-blue-400">.</span></h1>
    
    <nav class="flex gap-10">
        <button onclick="switchTab('wheel')" id="nav-wheel" class="tab-btn tab-active text-xs font-black uppercase tracking-widest">Studio</button>
        <button onclick="switchTab('history')" id="nav-history" class="tab-btn text-xs font-black uppercase tracking-widest">Riwayat</button>
        <button onclick="switchTab('template')" id="nav-template" class="tab-btn text-xs font-black uppercase tracking-widest">Templat</button>
    </nav>

    <a href="https://www.instagram.com/rifdev_/" target="_blank" class="dev-profile px-8 py-3 rounded-2xl text-white text-[10px] font-black uppercase tracking-[0.2em]">
        Developer
    </a>
</header>

<main class="max-w-7xl mx-auto px-12 pb-20">
    <div id="view-wheel" class="grid lg:grid-cols-12 gap-20 items-center fade-in">
        <div class="lg:col-span-7 flex flex-col items-center">
            <div class="relative">
                <canvas id="wheel" width="560" height="560"></canvas>
                
                <button onclick="spin()" class="btn-play absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-32 h-32 rounded-full z-10">
                    <span class="text-xs font-black text-blue-600 tracking-widest">SPIN</span>
                </button>

                <div class="absolute right-[-10px] top-1/2 -translate-y-1/2 w-14 h-14 bg-white shadow-xl rounded-full flex items-center justify-center z-20">
                    <div class="w-0 h-0 border-t-[10px] border-t-transparent border-r-[20px] border-r-blue-500 border-b-[10px] border-b-transparent"></div>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5">
            <div class="soft-card p-12">
                <div class="flex justify-between items-center mb-10">
                    <div>
                        <h3 class="text-2xl font-black text-blue-900 tracking-tighter">Daftar Nama</h3>
                        <p id="count" class="text-[10px] font-bold text-blue-400 uppercase tracking-widest mt-1">Ready to spin</p>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="saveAsTemplate()" class="p-4 bg-blue-50 text-blue-500 rounded-3xl hover:bg-blue-500 hover:text-white transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/></svg>
                        </button>
                        <button onclick="shuffle()" class="p-4 bg-slate-50 text-slate-400 rounded-3xl hover:bg-blue-100 hover:text-blue-500 transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"/></svg>
                        </button>
                    </div>
                </div>
                <textarea id="input" class="w-full h-80 rounded-[40px] p-8 outline-none font-bold text-lg resize-none mb-6 shadow-inner" placeholder="Masukkan nama..."></textarea>
                <button onclick="clearAll()" class="w-full text-center text-[10px] font-black text-slate-300 uppercase tracking-[0.3em] hover:text-red-400">Reset System</button>
            </div>
        </div>
    </div>

    <div id="view-history" class="hidden max-w-2xl mx-auto py-10 fade-in">
        <h3 class="text-4xl font-black text-blue-900 mb-10 tracking-tighter">Riwayat</h3>
        <div id="history-list" class="grid gap-6"></div>
    </div>

    <div id="view-template" class="hidden max-w-2xl mx-auto py-10 fade-in">
        <h3 class="text-4xl font-black text-blue-900 mb-10 tracking-tighter">Templat</h3>
        <div id="template-list" class="grid sm:grid-cols-2 gap-6"></div>
    </div>
</main>

<div id="modal" class="hidden fixed inset-0 bg-blue-900/10 backdrop-blur-3xl z-[100] flex items-center justify-center p-6">
    <div class="bg-white p-16 max-w-sm w-full rounded-[60px] text-center shadow-2xl scale-up-center">
        <div class="text-[10px] font-black tracking-[0.4em] text-blue-400 mb-6 uppercase">The Winner Is</div>
        <h2 id="winner" class="text-5xl font-black text-blue-900 mb-12 tracking-tight"></h2>
        <button onclick="removeWinner()" class="w-full py-6 bg-blue-600 text-white rounded-[30px] font-black text-xs tracking-widest shadow-xl shadow-blue-200">HAPUS & LANJUT</button>
        <button onclick="closeModal()" class="mt-6 text-slate-300 font-bold text-[10px] uppercase tracking-widest">Tutup</button>
    </div>
</div>

<script>
const canvas = document.getElementById('wheel');
const ctx = canvas.getContext('2d');
const input = document.getElementById('input');

let names = [];
let rotation = 0;
let spinning = false;
let winnerIndex = -1;

let history = JSON.parse(localStorage.getItem('rw_history')) || [];
let templates = JSON.parse(localStorage.getItem('rw_templates')) || [];

const colors = ["#3b82f6", "#60a5fa", "#93c5fd", "#2563eb", "#bfdbfe"];

function draw(){
    names = input.value.split('\n').filter(x=>x.trim());
    document.getElementById('count').innerText = names.length + " items active";
    ctx.clearRect(0,0,560,560);
    if(names.length === 0) return;

    let arc = 2 * Math.PI / names.length;
    names.forEach((n, i) => {
        let angle = rotation + i * arc;
        ctx.fillStyle = colors[i % colors.length];
        ctx.beginPath();
        ctx.moveTo(280, 280);
        ctx.arc(280, 280, 275, angle, angle + arc);
        ctx.fill();

        ctx.save();
        ctx.translate(280, 280);
        ctx.rotate(angle + arc / 2);
        ctx.fillStyle = "#ffffff";
        ctx.textAlign = "right";
        ctx.font = "800 16px 'Plus Jakarta Sans'";
        ctx.fillText(n.toUpperCase(), 250, 6);
        ctx.restore();
    });
}

function spin(){
    if(spinning || names.length < 2) return;
    spinning = true;
    
    let start = rotation;
    let extra = Math.PI * 2 * (12 + Math.random() * 8);
    let duration = 5000;
    let startTime = performance.now();

    function anim(t){
        let p = (t - startTime) / duration;
        if(p > 1) p = 1;
        let ease = 1 - Math.pow(1 - p, 4); 
        rotation = start + extra * ease;
        
        draw();
        if(p < 1) requestAnimationFrame(anim);
        else {
            spinning = false;
            let arc = 2 * Math.PI / names.length;
            let norm = (2 * Math.PI - (rotation % (2 * Math.PI))) % (2 * Math.PI);
            winnerIndex = Math.floor(norm / arc);
            showWinner(names[winnerIndex]);
        }
    }
    requestAnimationFrame(anim);
}

function switchTab(tab) {
    ['wheel', 'history', 'template'].forEach(t => {
        document.getElementById('view-' + t).classList.add('hidden');
        document.getElementById('nav-' + t).classList.remove('tab-active');
    });
    document.getElementById('view-' + tab).classList.remove('hidden');
    document.getElementById('nav-' + tab).classList.add('tab-active');
    if(tab === 'history') renderHistory();
    if(tab === 'template') renderTemplates();
}

function showWinner(name) {
    document.getElementById('winner').innerText = name;
    document.getElementById('modal').classList.remove('hidden');
    confetti({ particleCount: 150, spread: 70, origin: { y: 0.6 }, colors: ['#3b82f6', '#ffffff'] });
    history.unshift({ name, time: new Date().toLocaleTimeString() });
    localStorage.setItem('rw_history', JSON.stringify(history));
}

function renderHistory() {
    const list = document.getElementById('history-list');
    list.innerHTML = history.map(h => `
        <div class="soft-card p-8 flex justify-between items-center fade-in">
            <span class="font-black text-xl text-blue-900">${h.name}</span>
            <span class="text-[10px] font-bold text-slate-300 uppercase tracking-widest">${h.time}</span>
        </div>
    `).join('') || '<p class="text-center text-slate-300 py-10 font-bold uppercase tracking-widest">Kosong</p>';
}

function saveAsTemplate() {
    const n = prompt("Nama Templat?");
    if(n) {
        templates.push({ n, d: input.value });
        localStorage.setItem('rw_templates', JSON.stringify(templates));
    }
}

function renderTemplates() {
    const list = document.getElementById('template-list');
    list.innerHTML = templates.map((t, i) => `
        <div class="soft-card p-10 flex flex-col gap-6 fade-in">
            <h4 class="font-black text-xl text-blue-900">${t.n}</h4>
            <div class="flex gap-3">
                <button onclick="loadT(${i})" class="flex-1 py-4 bg-blue-600 text-white text-[10px] font-black tracking-widest rounded-2xl">PAKAI</button>
                <button onclick="deleteT(${i})" class="px-5 py-4 bg-red-50 text-red-400 rounded-2xl">DEL</button>
            </div>
        </div>
    `).join('') || '<p class="text-center text-slate-300 py-10 font-bold uppercase tracking-widest col-span-2">Belum ada templat</p>';
}

function loadT(i) { input.value = templates[i].d; draw(); switchTab('wheel'); }
function deleteT(i) { templates.splice(i, 1); localStorage.setItem('rw_templates', JSON.stringify(templates)); renderTemplates(); }
function closeModal() { document.getElementById('modal').classList.add('hidden'); }
function removeWinner() { names.splice(winnerIndex, 1); input.value = names.join('\n'); closeModal(); draw(); }
function shuffle() { let arr = input.value.split('\n').filter(x=>x.trim()); arr.sort(()=>Math.random()-0.5); input.value = arr.join('\n'); draw(); }
function clearAll() { if(confirm("Hapus semua?")) { input.value = ""; draw(); } }

input.addEventListener('input', draw);
input.value = "RIFQI\nRIFDEV\nELITE\nMINIMAL\nCREATIVE";
draw();
</script>

</body>
</html>
