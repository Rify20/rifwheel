<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel — Premium Name Picker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #FAFBFF; 
            color: #1A1C1E;
            -webkit-font-smoothing: antialiased;
        }

        /* Container Roda */
        .wheel-shadow {
            filter: drop-shadow(0 20px 50px rgba(0, 0, 0, 0.08));
        }

        /* Glass Card Style */
        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.03);
        }

        /* Pointer Custom */
        #pointer-container {
            position: absolute;
            right: -10px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 50;
        }

        /* Hide Scrollbar tapi tetep bisa scroll */
        textarea::-webkit-scrollbar { width: 4px; }
        textarea::-webkit-scrollbar-track { background: transparent; }
        textarea::-webkit-scrollbar-thumb { background: #E2E8F0; border-radius: 10px; }

        /* Animasi Pop Up */
        .pop-up {
            animation: popUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes popUp {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .spin-btn-inner {
            background: radial-gradient(circle, #2563EB 0%, #1D4ED8 100%);
        }
    </style>
</head>
<body class="min-h-screen overflow-hidden">

    <header class="h-20 px-12 flex items-center justify-between border-b border-gray-100 bg-white/50 backdrop-blur-md sticky top-0 z-50">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-blue-600 rounded-2xl flex items-center justify-center shadow-lg shadow-blue-100">
                <span class="text-white font-extrabold">R</span>
            </div>
            <div>
                <h1 class="text-lg font-bold tracking-tight">RifWheel</h1>
                <p class="text-[10px] text-gray-400 font-medium uppercase tracking-widest">by RifDev Studio</p>
            </div>
        </div>
        <div class="flex gap-8 items-center">
            <a href="https://www.instagram.com/rifdev_/" target="_blank" class="text-sm font-semibold text-gray-500 hover:text-blue-600 transition-all">Developer</a>
            <button onclick="clearAll()" class="text-xs font-bold text-red-400 hover:text-red-600">RESET DATA</button>
        </div>
    </header>

    <div class="max-w-[1440px] mx-auto flex flex-col lg:flex-row h-[calc(100vh-80px)]">
        
        <div class="flex-[1.5] relative flex items-center justify-center p-12 bg-[#FDFDFF]">
            <div class="relative w-full max-w-[620px] wheel-shadow" id="wheel-frame">
                <div id="pointer-container">
                    <svg width="45" height="45" viewBox="0 0 24 24" fill="none">
                        <path d="M19 12H5M5 12L11 18M5 12L11 6" stroke="#2563EB" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                
                <canvas id="wheelCanvas" width="1000" height="1000" class="w-full h-auto rounded-full"></canvas>
                
                <button onclick="spin()" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-28 h-28 bg-white rounded-full p-2 shadow-2xl z-[60] hover:scale-110 transition-transform active:scale-95 group">
                    <div class="w-full h-full spin-btn-inner rounded-full flex flex-col items-center justify-center text-white">
                        <span class="text-[10px] font-bold tracking-[0.2em] opacity-80">TAP TO</span>
                        <span class="text-lg font-black tracking-tighter italic">SPIN</span>
                    </div>
                </button>
            </div>
        </div>

        <div class="flex-1 bg-white border-l border-gray-100 flex flex-col p-10 relative">
            <div class="mb-8">
                <h3 class="text-2xl font-bold text-gray-900 mb-2">Daftar Entri</h3>
                <p class="text-gray-400 text-sm font-medium">Ketik nama di bawah, satu nama per baris.</p>
            </div>

            <div class="flex-1 glass-panel rounded-[32px] p-8 border border-gray-100 flex flex-col">
                <textarea id="namesInput" spellcheck="false" 
                    class="w-full h-full bg-transparent border-none outline-none text-xl font-medium text-gray-700 leading-loose resize-none placeholder:text-gray-200" 
                    placeholder="Contoh:&#10;Muhammad Rifqi&#10;Siti Aisyah..."></textarea>
                
                <div class="mt-6 flex justify-between items-center pt-6 border-t border-gray-50">
                    <div class="flex gap-2 items-center">
                        <span id="count" class="h-6 px-3 bg-blue-50 text-blue-600 rounded-full text-[10px] font-bold flex items-center">0 NAMA</span>
                    </div>
                    <button onclick="shuffleNames()" class="text-[10px] font-bold text-gray-400 hover:text-blue-600 tracking-widest uppercase">Acak Urutan</button>
                </div>
            </div>
        </div>
    </div>

    <div id="winnerModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-6">
        <div class="absolute inset-0 bg-white/20 backdrop-blur-[12px]"></div>
        <div class="bg-white relative p-12 rounded-[48px] shadow-[0_40px_100px_rgba(0,0,0,0.12)] max-w-sm w-full text-center pop-up border border-white">
            <div class="w-16 h-1 bg-blue-600 mx-auto mb-8 rounded-full"></div>
            <p class="text-gray-400 font-bold tracking-[0.3em] uppercase text-[10px] mb-4">The Result is</p>
            <h2 id="winnerName" class="text-4xl font-extrabold text-gray-900 mb-12 tracking-tight break-words"></h2>
            
            <div class="flex flex-col gap-3">
                <button onclick="removeWinner()" class="w-full py-5 bg-blue-600 text-white rounded-[24px] font-bold shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all text-sm">HAPUS & LANJUT</button>
                <button onclick="closeModal()" class="w-full py-5 bg-gray-50 text-gray-500 rounded-[24px] font-bold hover:bg-gray-100 transition-all text-sm">BIARKAN SAJA</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        
        let names = [];
        let currentRotation = 0;
        let isSpinning = false;
        let lastWinnerIdx = -1;

        // Sound System (Elegant Click)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.08);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.08);
        }

        // Palette Professional (Deep Blue & Clean White)
        const colors = ['#2563EB', '#FFFFFF', '#3B82F6', '#F8FAFC', '#1E40AF', '#F1F5F9'];

        function draw() {
            names = namesInput.value.split('\n').filter(n => n.trim() !== "");
            document.getElementById('count').innerText = `${names.length} NAMA`;
            localStorage.setItem('rifwheel_pro', namesInput.value);

            const arcSize = (2 * Math.PI) / (names.length || 1);
            ctx.clearRect(0, 0, 1000, 1000);

            if (names.length === 0) {
                ctx.fillStyle = "#F8FAFC";
                ctx.beginPath(); ctx.arc(500, 500, 480, 0, 2 * Math.PI); ctx.fill();
                return;
            }

            names.forEach((name, i) => {
                const angle = currentRotation + i * arcSize;
                ctx.fillStyle = colors[i % colors.length];
                
                ctx.beginPath();
                ctx.moveTo(500, 500);
                ctx.arc(500, 500, 480, angle, angle + arcSize);
                ctx.fill();

                // Garis pemisah halus
                ctx.strokeStyle = 'rgba(0,0,0,0.02)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Teks Nama
                ctx.save();
                ctx.translate(500, 500);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = (i % colors.length) % 2 === 0 ? "#FFFFFF" : "#2563EB";
                ctx.font = `600 ${Math.max(14, 28 - names.length/2)}px 'Inter'`;
                ctx.fillText(name.toUpperCase().substring(0, 20), 440, 10);
                ctx.restore();
            });

            // Outer ring
            ctx.beginPath();
            ctx.arc(500, 500, 480, 0, 2 * Math.PI);
            ctx.strokeStyle = '#FFFFFF';
            ctx.lineWidth = 15;
            ctx.stroke();
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            
            const duration = 8000; // Putaran lebih lama biar dramatis
            const extraRotation = (Math.random() * 5 + 10) * Math.PI * 2;
            const startRotation = currentRotation;
            const startTime = performance.now();
            let lastTick = 0;

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                
                // Quintic ease out (sangat halus di akhir)
                const ease = 1 - Math.pow(1 - progress, 5);
                currentRotation = startRotation + (extraRotation * ease);
                
                const arcSize = (2 * Math.PI) / names.length;
                if (Math.floor(currentRotation / (arcSize/2)) !== lastTick) {
                    playTick();
                    lastTick = Math.floor(currentRotation / (arcSize/2));
                }

                draw();

                if (progress < 1) requestAnimationFrame(animate);
                else {
                    isSpinning = false;
                    const normalized = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
                    lastWinnerIdx = Math.floor(normalized / arcSize);
                    showWinner(names[lastWinnerIdx]);
                }
            }
            requestAnimationFrame(animate);
        }

        function showWinner(name) {
            document.getElementById('winnerName').innerText = name;
            document.getElementById('winnerModal').classList.remove('hidden');
            confetti({
                particleCount: 150,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#2563EB', '#60A5FA', '#FFFFFF']
            });
        }

        function removeWinner() {
            if (lastWinnerIdx > -1) {
                names.splice(lastWinnerIdx, 1);
                namesInput.value = names.join('\n');
                closeModal();
                draw();
            }
        }

        function closeModal() { document.getElementById('winnerModal').classList.add('hidden'); }
        function shuffleNames() {
            let arr = namesInput.value.split('\n').filter(n => n.trim() !== "");
            arr.sort(() => Math.random() - 0.5);
            namesInput.value = arr.join('\n');
            draw();
        }
        function clearAll() { if(confirm('Hapus semua data?')) { namesInput.value = ""; draw(); } }

        namesInput.value = localStorage.getItem('rifwheel_pro') || "MUHAMMAD RIFQI\nAHMAD DHANI\nSITI NURHALIZA\nANDI WIJAYA\nBUDI SANTOSO";
        namesInput.addEventListener('input', draw);
        draw();
    </script>
</body>
</html>
