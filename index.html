<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel by RifDev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #F8FAFC; }
        #canvas-container { position: relative; width: 100%; max-width: 550px; margin: auto; }
        /* Panah Penunjuk */
        #wheel-pointer {
            position: absolute; top: 50%; right: -10px; transform: translateY(-50%);
            width: 40px; height: 40px; background: #2563EB; 
            clip-path: polygon(100% 50%, 0 0, 0 100%); z-index: 20;
            filter: drop-shadow(-2px 0 5px rgba(0,0,0,0.2));
        }
    </style>
</head>
<body class="text-slate-800">

    <div class="min-h-screen flex flex-col items-center p-4 md:p-8">
        <div class="text-center mb-10">
            <h1 class="text-5xl font-extrabold text-blue-600 tracking-tight">RifWheel</h1>
            <p class="text-slate-400 font-medium">By RifDev • Pemilih Nama Acak Online</p>
        </div>

        <div class="flex flex-col lg:flex-row gap-12 w-full max-w-7xl items-start">
            
            <div class="flex-[2] w-full flex flex-col items-center">
                <div id="canvas-container">
                    <div id="wheel-pointer"></div>
                    <canvas id="wheelCanvas" width="600" height="600" class="w-full h-auto drop-shadow-2xl"></canvas>
                </div>
                <button onclick="spinWheel()" id="spinBtn" class="mt-12 bg-blue-600 hover:bg-blue-700 text-white font-extrabold py-5 px-16 rounded-2xl text-2xl transition-all shadow-[0_10px_0_0_#1e40af] active:shadow-none active:translate-y-[10px]">
                    PUTAR RODA!
                </button>
            </div>

            <div class="flex-1 w-full bg-white p-8 rounded-3xl shadow-2xl border border-slate-100">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-xl font-bold text-slate-700">Daftar Nama</h2>
                    <span id="count" class="bg-blue-100 text-blue-600 px-3 py-1 rounded-full text-sm font-bold">0 Nama</span>
                </div>
                <textarea id="namesInput" 
                    class="w-full h-[400px] p-5 border-2 border-slate-100 rounded-2xl focus:border-blue-400 focus:ring-0 focus:outline-none resize-none text-lg leading-relaxed transition-all" 
                    placeholder="Masukkan nama dipisah baris baru..."></textarea>
                <button onclick="clearNames()" class="mt-4 text-red-400 hover:text-red-600 text-sm font-semibold transition-colors">Hapus Semua</button>
            </div>
        </div>
    </div>

    <div id="winnerModal" class="hidden fixed inset-0 bg-slate-900/90 backdrop-blur-sm flex items-center justify-center z-50 p-6">
        <div class="bg-white p-10 rounded-[40px] text-center max-w-md w-full shadow-2xl transform transition-all">
            <p class="text-slate-400 font-bold uppercase tracking-widest text-sm">🎉 Kita Punya Pemenang 🎉</p>
            <div id="winnerText" class="text-5xl font-black text-blue-600 my-8 break-words leading-tight"></div>
            <button onclick="closeModal()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 py-4 rounded-2xl font-bold text-lg transition-colors">Tutup & Main Lagi</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        const countDisplay = document.getElementById('count');
        
        let names = [];
        let currentRotation = 0;
        let isSpinning = false;

        // Load data dari memori browser (LocalStorage)
        const savedNames = localStorage.getItem('rifWheelNames');
        namesInput.value = savedNames || "RifDev\nBudi\nSiti\nAndi\nDewi\nJoko";

        function drawWheel() {
            names = namesInput.value.split('\n').filter(name => name.trim() !== "");
            countDisplay.innerText = `${names.length} Nama`;
            localStorage.setItem('rifWheelNames', namesInput.value);

            if (names.length === 0) {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                return;
            }

            const arcSize = (2 * Math.PI) / names.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const angle = currentRotation + i * arcSize;
                
                // Warna Biru & Putih
                ctx.fillStyle = i % 2 === 0 ? '#2563EB' : '#FFFFFF';
                
                ctx.beginPath();
                ctx.moveTo(300, 300);
                ctx.arc(300, 300, 280, angle, angle + arcSize);
                ctx.lineTo(300, 300);
                ctx.fill();
                
                // Border segmen
                ctx.strokeStyle = '#E2E8F0';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Gambar Teks
                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = i % 2 === 0 ? "#FFFFFF" : "#1E40AF";
                ctx.font = "bold 22px 'Plus Jakarta Sans'";
                ctx.fillText(name.substring(0, 18), 250, 10);
                ctx.restore();
            });
            
            // Lingkaran Tengah (Logo)
            ctx.beginPath();
            ctx.arc(300, 300, 40, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFFFFF';
            ctx.fill();
            ctx.strokeStyle = '#2563EB';
            ctx.lineWidth = 5;
            ctx.stroke();
        }

        function spinWheel() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            
            const spinDuration = 5000;
            const extraSpins = (Math.random() * 10 + 10) * Math.PI * 2;
            const startRotation = currentRotation;
            const endRotation = startRotation + extraSpins;
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                
                // Easing Out Cubic
                const easing = 1 - Math.pow(1 - progress, 3);
                currentRotation = startRotation + (extraSpins * easing);
                
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    const normalizedRotation = (currentRotation % (2 * Math.PI));
                    const arcSize = (2 * Math.PI) / names.length;
                    
                    // Hitung pemenang berdasarkan posisi panah (di kanan/0 radian)
                    const winningIndex = Math.floor((2 * Math.PI - normalizedRotation % (2 * Math.PI)) / arcSize) % names.length;
                    
                    showWinner(names[winningIndex]);
                }
            }
            requestAnimationFrame(animate);
        }

        function showWinner(name) {
            document.getElementById('winnerText').innerText = name;
            document.getElementById('winnerModal').classList.remove('hidden');
            confetti({
                particleCount: 200,
                spread: 100,
                origin: { y: 0.6 },
                colors: ['#2563EB', '#FFFFFF', '#93C5FD']
            });
        }

        function closeModal() {
            document.getElementById('winnerModal').classList.add('hidden');
        }

        function clearNames() {
            if(confirm('Hapus semua nama?')) {
                namesInput.value = "";
                drawWheel();
            }
        }

        namesInput.addEventListener('input', drawWheel);
        drawWheel();
    </script>
</body>
</html>
