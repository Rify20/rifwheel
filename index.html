<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel by RifDev - Putar Keberuntunganmu</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap');
        body { font-family: 'Poppins', sans-serif; background-color: #f0f7ff; }
        #canvas-container { position: relative; width: 100%; max-width: 500px; margin: auto; }
        #wheel-pointer {
            position: absolute; top: 50%; right: -20px; transform: translateY(-50%);
            width: 40px; height: 40px; background: #1e40af; clip-path: polygon(100% 50%, 0 0, 0 100%);
            z-index: 10;
        }
    </style>
</head>
<body class="text-blue-900">

    <div class="min-h-screen flex flex-col items-center p-4">
        <header class="text-center mb-8">
            <h1 class="text-4xl font-extrabold text-blue-700">RifWheel <span class="text-blue-400">by RifDev</span></h1>
            <p class="text-blue-500">Tentukan pilihanmu dengan adil dan seru!</p>
        </header>

        <div class="flex flex-col lg:flex-row gap-8 w-full max-w-6xl items-center lg:items-start">
            
            <div class="flex-1 w-full text-center">
                <div id="canvas-container">
                    <div id="wheel-pointer"></div>
                    <canvas id="wheelCanvas" width="500" height="500" class="w-full h-auto drop-shadow-2xl"></canvas>
                </div>
                <button onclick="spinWheel()" id="spinBtn" class="mt-8 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 px-12 rounded-full text-2xl transition-all transform hover:scale-110 active:scale-95 shadow-lg">
                    PUTAR SEKARANG!
                </button>
            </div>

            <div class="w-full lg:w-1/3 bg-white p-6 rounded-2xl shadow-xl border-t-4 border-blue-500">
                <h2 class="text-xl font-bold mb-4">Daftar Nama</h2>
                <textarea id="namesInput" class="w-full h-64 p-4 border-2 border-blue-100 rounded-xl focus:border-blue-500 focus:outline-none resize-none" placeholder="Masukkan satu nama per baris..."></textarea>
                <p class="text-xs text-gray-400 mt-2 italic">*Ketik nama lalu tekan Enter untuk baris baru.</p>
            </div>
        </div>
    </div>

    <div id="winnerModal" class="hidden fixed inset-0 bg-blue-900/80 flex items-center justify-center z-50 p-4">
        <div class="bg-white p-8 rounded-3xl text-center max-w-sm w-full shadow-2xl">
            <h2 class="text-2xl font-bold text-gray-600">Selamat! Pemenangnya:</h2>
            <div id="winnerText" class="text-4xl font-black text-blue-600 my-6 break-words"></div>
            <button onclick="closeModal()" class="bg-blue-600 text-white px-8 py-2 rounded-full font-bold hover:bg-blue-700">Tutup</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        
        // Default Names
        namesInput.value = "RifDev\nBudi\nSiti\nAndi\nDewi\nJoko";

        let names = [];
        let currentRotation = 0;
        let isSpinning = false;

        function drawWheel() {
            names = namesInput.value.split('\n').filter(name => name.trim() !== "");
            if (names.length === 0) return;

            const arcSize = (2 * Math.PI) / names.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            names.forEach((name, i) => {
                const angle = currentRotation + i * arcSize;
                
                // Desain Biru-Putih bergantian
                ctx.fillStyle = i % 2 === 0 ? '#1e40af' : '#ffffff';
                ctx.beginPath();
                ctx.moveTo(250, 250);
                ctx.arc(250, 250, 240, angle, angle + arcSize);
                ctx.lineTo(250, 250);
                ctx.fill();
                ctx.strokeStyle = '#dbeafe';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Teks Nama
                ctx.save();
                ctx.translate(250, 250);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = i % 2 === 0 ? "#ffffff" : "#1e40af";
                ctx.font = "bold 18px Poppins";
                ctx.fillText(name.substring(0, 15), 220, 10);
                ctx.restore();
            });
        }

        function spinWheel() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            
            const extraSpins = (Math.random() * 5 + 5) * 2 * Math.PI;
            const finalRotation = currentRotation + extraSpins;
            const start = performance.now();
            const duration = 4000;

            function animate(time) {
                let elapsed = time - start;
                let progress = Math.min(elapsed / duration, 1);
                
                // Easing out effect
                let easeOut = 1 - Math.pow(1 - progress, 3);
                currentRotation = (finalRotation - 0) * easeOut;
                
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    determineWinner();
                }
            }
            requestAnimationFrame(animate);
        }

        function determineWinner() {
            const arcSize = (2 * Math.PI) / names.length;
            // Pointer di kanan (0 radian)
            const normalizedRotation = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
            const winnerIndex = Math.floor(normalizedRotation / arcSize);
            
            document.getElementById('winnerText').innerText = names[winnerIndex];
            document.getElementById('winnerModal').classList.remove('hidden');
            
            confetti({
                particleCount: 150,
                spread: 70,
                origin: { y: 0.6 },
                colors: ['#1e40af', '#ffffff', '#60a5fa']
            });
        }

        function closeModal() {
            document.getElementById('winnerModal').classList.add('hidden');
        }

        namesInput.addEventListener('input', drawWheel);
        drawWheel();
    </script>
</body>
</html>
