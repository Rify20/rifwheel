<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel - By RifDev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #f0f7ff; overflow-x: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.5); }
        
        /* Animasi Roda & Pointer */
        #wheel-pointer {
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1));
            transition: all 0.3s ease;
        }
        .spinning #wheel-pointer { transform: translateY(-50%) scale(1.1) translateX(-5px); }

        /* Custom Scrollbar */
        textarea::-webkit-scrollbar { width: 8px; }
        textarea::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        textarea::-webkit-scrollbar-thumb { background: #bfdbfe; border-radius: 10px; }
        textarea::-webkit-scrollbar-thumb:hover { background: #3b82f6; }

        /* Animation Keyframes */
        @keyframes float { 0% { transform: translateY(0px); } 50% { transform: translateY(-10px); } 100% { transform: translateY(0px); } }
        .float { animation: float 3s ease-in-out infinite; }
        
        .winner-pop { animation: pop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes pop { 0% { transform: scale(0.5); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body class="text-blue-900">

    <nav class="w-full py-4 px-6 flex justify-between items-center max-w-7xl mx-auto">
        <div class="flex items-center gap-2">
            <div class="w-10 h-10 bg-blue-600 rounded-xl flex items-center justify-center shadow-lg shadow-blue-200">
                <span class="text-white font-black text-xl">R</span>
            </div>
            <span class="text-2xl font-extrabold tracking-tight">RifWheel</span>
        </div>
        <button onclick="showInfo()" class="group flex items-center gap-2 bg-white px-4 py-2 rounded-full shadow-sm hover:shadow-md transition-all border border-blue-50/50">
            <span class="text-sm font-bold text-blue-600">Developer</span>
            <div class="w-8 h-8 rounded-full bg-blue-50 flex items-center justify-center group-hover:bg-blue-600 group-hover:text-white transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                    <path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="m8.93 6.588-2.29.287-.082.38.45.083c.294.07.352.176.288.469l-.738 3.468c-.194.897.105 1.319.808 1.319.545 0 1.178-.252 1.465-.598l.088-.416c-.2.176-.492.246-.686.246-.275 0-.375-.193-.304-.533L8.93 6.588zM9 4.5a1 1 0 1 1-2 0 1 1 0 0 1 2 0z"/>
                </svg>
            </div>
        </button>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-8 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center">
        
        <div class="lg:col-span-7 flex flex-col items-center">
            <div class="relative w-full max-w-[550px]" id="wheel-container">
                <div id="wheel-pointer" class="absolute -right-2 top-1/2 -translate-y-1/2 z-30 transform scale-x-[-1]">
                    <svg width="60" height="60" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M19 12L5 12M5 12L11 18M5 12L11 6" stroke="#2563EB" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </div>
                <canvas id="wheelCanvas" width="600" height="600" class="w-full h-auto drop-shadow-[0_20px_50px_rgba(37,99,235,0.2)] rounded-full"></canvas>
            </div>
            
            <button id="spinBtn" onclick="spinWheel()" class="mt-12 group relative inline-flex items-center justify-center px-16 py-5 overflow-hidden font-extrabold tracking-tighter text-white bg-gray-800 rounded-2xl group">
                <span class="absolute w-0 h-0 transition-all duration-500 ease-out bg-blue-600 rounded-full group-hover:w-[400px] group-hover:h-[400px]"></span>
                <span class="relative text-2xl">PUTAR SEKARANG! 🚀</span>
            </button>
        </div>

        <div class="lg:col-span-5 w-full">
            <div class="glass-card p-8 rounded-[32px] shadow-xl shadow-blue-100/50">
                <div class="flex items-center justify-between mb-6">
                    <div>
                        <h3 class="text-2xl font-extrabold">Daftar Nama</h3>
                        <p class="text-blue-400 text-sm">Tambahkan peserta di sini</p>
                    </div>
                    <div id="count" class="bg-blue-600 text-white px-4 py-1.5 rounded-xl text-sm font-bold shadow-md shadow-blue-200">
                        0 Peserta
                    </div>
                </div>

                <textarea id="namesInput" spellcheck="false" class="w-full h-[350px] p-6 bg-blue-50/30 border-2 border-blue-100/50 rounded-2xl focus:border-blue-500 focus:bg-white transition-all outline-none text-lg font-medium leading-relaxed" placeholder="Contoh:&#10;RifDev&#10;Budi Utama&#10;Siti Aminah..."></textarea>
                
                <div class="flex gap-3 mt-6">
                    <button onclick="clearNames()" class="flex-1 py-4 px-6 rounded-xl font-bold text-red-400 hover:bg-red-50 transition-colors">Reset</button>
                    <button onclick="copyCurrentNames()" class="flex-1 py-4 px-6 rounded-xl font-bold text-blue-400 hover:bg-blue-50 transition-colors">Salin</button>
                </div>
            </div>
        </div>
    </main>

    <div id="winnerModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-4 overflow-hidden">
        <div class="absolute inset-0 bg-blue-950/40 backdrop-blur-md"></div>
        <div class="glass-card relative p-12 rounded-[48px] shadow-2xl max-w-md w-full text-center winner-pop">
            <div class="w-20 h-20 bg-yellow-400 rounded-full flex items-center justify-center mx-auto mb-6 shadow-lg shadow-yellow-200 float">
                <span class="text-4xl">🏆</span>
            </div>
            <h2 class="text-blue-400 font-bold tracking-widest uppercase text-sm mb-2">Pemenang Ditemukan!</h2>
            <div id="winnerText" class="text-5xl font-black text-blue-900 mb-10 break-words leading-tight"></div>
            <button onclick="closeModal()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-5 rounded-2xl font-extrabold text-xl shadow-lg shadow-blue-200 transition-transform active:scale-95">Main Lagi</button>
        </div>
    </div>

    <div id="infoModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center px-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="closeInfo()"></div>
        <div class="bg-white relative p-10 rounded-[40px] shadow-2xl max-w-sm w-full text-center winner-pop">
            <div class="w-24 h-24 bg-gradient-to-tr from-purple-500 to-pink-500 rounded-full p-1 mx-auto mb-6">
                <div class="w-full h-full bg-white rounded-full p-1">
                    <img src="https://img.icons8.com/color/144/instagram-new--v1.png" class="w-full h-full object-contain">
                </div>
            </div>
            <h3 class="text-2xl font-black mb-1">RifDev</h3>
            <p class="text-slate-500 mb-6 font-medium">Fullstack Developer & Designer</p>
            <a href="https://www.instagram.com/rifdev_/" target="_blank" class="block w-full bg-gradient-to-r from-purple-600 to-pink-600 text-white py-4 rounded-2xl font-bold mb-4 shadow-lg">Follow @rifdev_</a>
            <button onclick="closeInfo()" class="text-slate-400 font-bold">Tutup</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        
        let names = [];
        let currentRotation = 0;
        let isSpinning = false;

        // Colors with gradients effect
        const colors = [
            { main: '#2563EB', text: '#FFFFFF' }, // Biru Utama
            { main: '#FFFFFF', text: '#1E40AF' }, // Putih
            { main: '#60A5FA', text: '#FFFFFF' }, // Biru Muda
            { main: '#EFF6FF', text: '#1E40AF' }  // Biru Sangat Muda
        ];

        // Load data
        namesInput.value = localStorage.getItem('rifWheelNames') || "RifDev\nBudi\nSiti\nAndi\nDewi\nJoko\nFarhan\nPutri";

        function drawWheel() {
            names = namesInput.value.split('\n').filter(name => name.trim() !== "");
            document.getElementById('count').innerText = `${names.length} Peserta`;
            localStorage.setItem('rifWheelNames', namesInput.value);

            const arcSize = (2 * Math.PI) / names.length;
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (names.length === 0) return;

            names.forEach((name, i) => {
                const angle = currentRotation + i * arcSize;
                const colorIdx = i % colors.length;
                
                // Segmen
                ctx.fillStyle = colors[colorIdx].main;
                ctx.beginPath();
                ctx.moveTo(300, 300);
                ctx.arc(300, 300, 280, angle, angle + arcSize);
                ctx.lineTo(300, 300);
                ctx.fill();
                
                // Shadowing inside segments
                ctx.strokeStyle = 'rgba(0,0,0,0.05)';
                ctx.lineWidth = 1;
                ctx.stroke();

                // Teks
                ctx.save();
                ctx.translate(300, 300);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = colors[colorIdx].text;
                ctx.font = "bold 20px 'Outfit'";
                ctx.fillText(name.substring(0, 16), 250, 8);
                ctx.restore();
            });

            // Center Point Modern
            ctx.beginPath();
            ctx.arc(300, 300, 35, 0, 2 * Math.PI);
            ctx.fillStyle = '#FFFFFF';
            ctx.shadowBlur = 15;
            ctx.shadowColor = 'rgba(0,0,0,0.1)';
            ctx.fill();
            
            ctx.shadowBlur = 0;
            ctx.strokeStyle = '#2563EB';
            ctx.lineWidth = 8;
            ctx.stroke();
        }

        function spinWheel() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            document.getElementById('wheel-container').classList.add('spinning');
            
            const spinDuration = 6000;
            const extraSpins = (Math.random() * 8 + 12) * Math.PI * 2;
            const startRotation = currentRotation;
            const startTime = performance.now();

            function animate(currentTime) {
                const elapsed = currentTime - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);
                
                // Custom Cubic Easing for super smooth finish
                const t = progress;
                const easing = 1 - Math.pow(1 - t, 4); 
                
                currentRotation = startRotation + (extraSpins * easing);
                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    finishSpin();
                }
            }
            requestAnimationFrame(animate);
        }

        function finishSpin() {
            isSpinning = false;
            document.getElementById('wheel-container').classList.remove('spinning');
            
            const arcSize = (2 * Math.PI) / names.length;
            const normalizedRotation = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
            const winnerIndex = Math.floor(normalizedRotation / arcSize);
            
            document.getElementById('winnerText').innerText = names[winnerIndex];
            document.getElementById('winnerModal').classList.remove('hidden');
            
            confetti({
                particleCount: 150,
                spread: 80,
                origin: { y: 0.6 },
                colors: ['#2563EB', '#60A5FA', '#FFFFFF']
            });
        }

        function closeModal() { document.getElementById('winnerModal').classList.add('hidden'); }
        function showInfo() { document.getElementById('infoModal').classList.remove('hidden'); }
        function closeInfo() { document.getElementById('infoModal').classList.add('hidden'); }
        function clearNames() { if(confirm('Kosongkan semua nama?')) { namesInput.value = ""; drawWheel(); } }
        
        namesInput.addEventListener('input', drawWheel);
        drawWheel();
    </script>
</body>
</html>
