<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RifWheel by RifDev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #ffffff; }
        .main-container { height: calc(100vh - 70px); }
        #wheel-container { position: relative; aspect-ratio: 1/1; width: 100%; max-width: 550px; }
        
        /* Pointer Persis Wheel of Names */
        #pointer {
            position: absolute; right: -15px; top: 50%; transform: translateY(-50%);
            width: 50px; height: 50px; z-index: 100;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.2));
        }

        .btn-spin {
            background: #1d4ed8; color: white;
            box-shadow: 0 4px 0 #1e3a8a; transition: all 0.1s;
        }
        .btn-spin:active { transform: translateY(4px); box-shadow: 0 0 0 #1e3a8a; }
        
        /* Modal Style */
        .modal-enter { animation: zoomIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes zoomIn { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="overflow-hidden">

    <nav class="h-[60px] border-b flex items-center justify-between px-6 bg-white">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white font-bold">R</div>
            <h1 class="text-xl font-bold text-gray-700">RifWheel <span class="text-blue-600">by RifDev</span></h1>
        </div>
        <div class="flex gap-4">
            <a href="https://www.instagram.com/rifdev_/" target="_blank" class="text-sm font-semibold text-blue-600 border border-blue-600 px-4 py-1.5 rounded-md hover:bg-blue-50 transition">Info Developer</a>
        </div>
    </nav>

    <div class="main-container flex flex-col md:flex-row w-full">
        <div class="flex-[3] flex flex-col items-center justify-center bg-[#f8f9fa] p-4 relative">
            <div id="wheel-container">
                <img id="pointer" src="https://cdn-icons-png.flaticon.com/512/32/32213.png" alt="pointer">
                <canvas id="wheelCanvas" width="800" height="800" class="w-full h-full"></canvas>
                <button onclick="spin()" class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-20 h-20 bg-white rounded-full shadow-xl border-4 border-blue-600 z-50 font-bold text-blue-600 hover:scale-105 transition">PUTAR</button>
            </div>
        </div>

        <div class="flex-1 border-l bg-white flex flex-col p-4 shadow-2xl">
            <div class="flex justify-between items-center mb-2">
                <span class="font-bold text-gray-600 uppercase text-xs tracking-wider">Entri Nama</span>
                <span id="entryCount" class="text-xs font-bold text-blue-600 bg-blue-50 px-2 py-1 rounded">0 Nama</span>
            </div>
            <textarea id="namesInput" spellcheck="false" class="w-full flex-1 border rounded-md p-4 focus:ring-2 focus:ring-blue-500 outline-none text-lg leading-relaxed resize-none bg-gray-50 font-medium" placeholder="Masukkan nama..."></textarea>
            <div class="grid grid-cols-2 gap-2 mt-3">
                <button onclick="shuffleNames()" class="py-2 bg-gray-100 hover:bg-gray-200 rounded font-semibold text-sm">Acak Daftar</button>
                <button onclick="clearAll()" class="py-2 bg-gray-100 hover:bg-gray-200 rounded font-semibold text-sm text-red-500">Hapus Semua</button>
            </div>
        </div>
    </div>

    <div id="winnerModal" class="hidden fixed inset-0 z-[200] flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-black/60 backdrop-blur-sm"></div>
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center relative z-10 modal-enter shadow-2xl">
            <p class="text-gray-400 font-bold mb-2">PEMENANG!</p>
            <h2 id="winnerName" class="text-4xl font-black text-blue-700 mb-8 break-words"></h2>
            <div class="flex flex-col gap-2">
                <button onclick="removeWinner()" class="bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg shadow-blue-200">Hapus Nama Ini</button>
                <button onclick="closeModal()" class="bg-gray-100 text-gray-600 py-3 rounded-xl font-bold hover:bg-gray-200">Tutup</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const namesInput = document.getElementById('namesInput');
        
        let names = [];
        let currentRotation = 0;
        let isSpinning = false;
        let lastWinnerIndex = -1;

        // Sound Effects (Web Audio API)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTick() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        const colors = ['#3369e8', '#d50f25', '#eeb211', '#009925', '#3369e8', '#d50f25'];

        function draw() {
            names = namesInput.value.split('\n').filter(n => n.trim() !== "");
            document.getElementById('entryCount').innerText = `${names.length} Nama`;
            localStorage.setItem('rifwheel_data', namesInput.value);

            const arcSize = (2 * Math.PI) / (names.length || 1);
            ctx.clearRect(0, 0, 800, 800);

            if (names.length === 0) {
                ctx.fillStyle = "#ddd";
                ctx.beginPath();
                ctx.arc(400, 400, 380, 0, 2 * Math.PI);
                ctx.fill();
                return;
            }

            names.forEach((name, i) => {
                const angle = currentRotation + i * arcSize;
                ctx.fillStyle = colors[i % colors.length];
                ctx.beginPath();
                ctx.moveTo(400, 400);
                ctx.arc(400, 400, 380, angle, angle + arcSize);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.lineWidth = 2;
                ctx.stroke();

                ctx.save();
                ctx.translate(400, 400);
                ctx.rotate(angle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillStyle = "white";
                ctx.font = `bold ${Math.max(12, 30 - names.length)}px Arial`;
                ctx.fillText(name, 350, 10);
                ctx.restore();
            });
        }

        function spin() {
            if (isSpinning || names.length < 2) return;
            isSpinning = true;
            
            const duration = 6000;
            const extraRotation = (Math.random() * 10 + 15) * Math.PI * 2;
            const startRotation = currentRotation;
            const startTime = performance.now();
            let lastTickAngle = 0;

            function animate(time) {
                const elapsed = time - startTime;
                const progress = Math.min(elapsed / duration, 1);
                const ease = 1 - Math.pow(1 - progress, 4);
                
                currentRotation = startRotation + (extraRotation * ease);
                
                // Sound logic (tick setiap kali ngelewati segment)
                const arcSize = (2 * Math.PI) / names.length;
                if (Math.floor(currentRotation / arcSize) !== lastTickAngle) {
                    playTick();
                    lastTickAngle = Math.floor(currentRotation / arcSize);
                }

                draw();

                if (progress < 1) requestAnimationFrame(animate);
                else {
                    isSpinning = false;
                    const normalized = (2 * Math.PI - (currentRotation % (2 * Math.PI))) % (2 * Math.PI);
                    lastWinnerIndex = Math.floor(normalized / arcSize);
                    showWinner(names[lastWinnerIndex]);
                }
            }
            requestAnimationFrame(animate);
        }

        function showWinner(name) {
            document.getElementById('winnerName').innerText = name;
            document.getElementById('winnerModal').classList.remove('hidden');
            confetti({ particleCount: 200, spread: 90, origin: { y: 0.7 } });
        }

        function removeWinner() {
            if (lastWinnerIndex > -1) {
                names.splice(lastWinnerIndex, 1);
                namesInput.value = names.join('\n');
                closeModal();
                draw();
            }
        }

        function closeModal() { document.getElementById('winnerModal').classList.add('hidden'); }
        function clearAll() { if(confirm('Hapus semua?')) { namesInput.value = ""; draw(); } }
        function shuffleNames() {
            let arr = namesInput.value.split('\n').filter(n => n.trim() !== "");
            arr.sort(() => Math.random() - 0.5);
            namesInput.value = arr.join('\n');
            draw();
        }

        namesInput.value = localStorage.getItem('rifwheel_data') || "RifDev\nAndi\nSiti\nBudi\nDewi\nJoko\nLina\nRizky";
        namesInput.addEventListener('input', draw);
        draw();
    </script>
</body>
</html>
